// ═══════════════════════════════════════════════════════════════
//  Render song list
// ═══════════════════════════════════════════════════════════════
function renderSongList() {
  const container = document.getElementById('song-list');
  // Clear previous cards (keep h1 and subtitle)
  const existing = container.querySelectorAll('.song-card, .section-header');
  existing.forEach(e => e.remove());

  const sections = [
    { label: '🎵 100首最熱廣東歌', start: 0,   end: 99  },
    { label: '🎭 新馬師曾',         start: 100, end: 103 },
    { label: '🎭 紅線女',           start: 104, end: 107 },
  ];

  let sIdx = 0;
  SONGS.forEach((song, idx) => {
    // Insert section header when needed
    if (sIdx < sections.length && idx === sections[sIdx].start) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = sections[sIdx].label;
      container.appendChild(hdr);
      sIdx++;
    }
    const card = document.createElement('div');
    card.className = 'song-card';
    card.dataset.idx = idx;
    card.onclick = () => playSong(idx);
    card.innerHTML = `
      <span class="rank">${idx + 1}</span>
      <img class="thumb"
           src="https://img.youtube.com/vi/${song.vid}/mqdefault.jpg"
           alt="封面" loading="lazy">
      <div class="song-info">
        <div class="song-title">${song.title}</div>
        <div class="song-meta">${song.meta}</div>
      </div>`;
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════════
//  Playlist state
// ═══════════════════════════════════════════════════════════════
let playlist   = [...Array(SONGS.length).keys()];
let currentPos = -1;
let mode       = 'order';
let player     = null;
let adCheckInterval = null;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-label').textContent =
    m === 'shuffle' ? '🔀 隨機播放中' : '▶ 順序播放中';
  document.getElementById('btn-order').style.background   = m === 'order'   ? '#c00' : '#333';
  document.getElementById('btn-shuffle').style.background = m === 'shuffle' ? '#c00' : '#333';
  if (m === 'shuffle') {
    shuffle(playlist);
    if (currentPos >= 0) {
      const cur = playlist[currentPos];
      playlist.splice(playlist.indexOf(cur), 1);
      playlist.unshift(cur);
      currentPos = 0;
    }
  } else {
    const curIdx = currentPos >= 0 ? playlist[currentPos] : -1;
    playlist = [...Array(SONGS.length).keys()];
    currentPos = curIdx >= 0 ? curIdx : -1;
  }
}

function playSong(songIdx) {
  hideOverlay();
  currentPos = playlist.indexOf(songIdx);
  if (currentPos === -1) {
    playlist = [...Array(SONGS.length).keys()];
    if (mode === 'shuffle') shuffle(playlist);
    currentPos = playlist.indexOf(songIdx);
  }
  loadVideo(songIdx);
}

function playNext() {
  hideOverlay();
  if (currentPos === -1) { playSong(0); return; }
  currentPos = (currentPos + 1) % playlist.length;
  loadVideo(playlist[currentPos]);
}

function playPrev() {
  hideOverlay();
  if (currentPos === -1) { playSong(0); return; }
  currentPos = (currentPos - 1 + playlist.length) % playlist.length;
  loadVideo(playlist[currentPos]);
}

function loadVideo(songIdx) {
  const song = SONGS[songIdx];
  if (player && player.loadVideoById) {
    player.loadVideoById(song.vid);
  }
  document.getElementById('player-title').textContent = song.title;
  document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.song-card[data-idx="${songIdx}"]`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ═══════════════════════════════════════════════════════════════
//  Ad-skip: poll every 800ms; if duration < 60s and playing,
//  assume it's an ad and seek to end.
// ═══════════════════════════════════════════════════════════════
function startAdCheck() {
  stopAdCheck();
  adCheckInterval = setInterval(() => {
    if (!player || typeof player.getPlayerState !== 'function') return;
    const state = player.getPlayerState();
    if (state !== YT.PlayerState.PLAYING) return;
    try {
      const duration = player.getDuration();
      const current  = player.getCurrentTime();
      // Ads are typically ≤ 60 seconds; normal songs are longer
      if (duration > 0 && duration <= 60 && current < duration - 1) {
        document.getElementById('ad-status').style.display = 'inline';
        player.seekTo(duration, true);   // jump to end of ad
      } else {
        document.getElementById('ad-status').style.display = 'none';
      }
    } catch(_) {}
  }, 800);
}

function stopAdCheck() {
  if (adCheckInterval) { clearInterval(adCheckInterval); adCheckInterval = null; }
  document.getElementById('ad-status').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════
//  YouTube IFrame API callbacks
// ═══════════════════════════════════════════════════════════════
function onYouTubeIframeAPIReady() {
  player = new YT.Player('ytplayer', {
    width: '100%', height: '100%',
    playerVars: { autoplay: 1, rel: 0 },
    events: {
      onReady:       () => playSong(0),
      onStateChange: onPlayerStateChange,
      onError:       onPlayerError
    }
  });
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    startAdCheck();
  } else if (event.data === YT.PlayerState.ENDED) {
    stopAdCheck();
    setTimeout(playNext, 1000);
  } else {
    stopAdCheck();
  }
}

function onPlayerError(event) {
  stopAdCheck();
  if (event.data === 153 || event.data === 150) {
    const vid = SONGS[playlist[currentPos]].vid;
    document.getElementById('btn-watch-yt').href =
      'https://www.youtube.com/watch?v=' + vid;
    document.getElementById('error-overlay').classList.add('visible');
  }
}

// ═══════════════════════════════════════════════════════════════
//  UI helpers
// ═══════════════════════════════════════════════════════════════
function hideOverlay() {
  document.getElementById('error-overlay').classList.remove('visible');
}

function toggleVideo() {
  const wrapper = document.getElementById('player-wrapper');
  const btn = document.getElementById('btn-toggle-video');
  const isHidden = wrapper.classList.toggle('hidden-video');
  btn.textContent = isHidden ? '📺 顯示影片' : '🎵 純音樂模式';
  btn.classList.toggle('active', isHidden);
}

// ═══════════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════════
renderSongList();
</script>
