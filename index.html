<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>廣東歌播放器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #111; color: #eee;
  }
  #player-section {
    background: #000;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 12px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,.8);
  }
  #player-title {
    font-size: 1rem; color: #fff; margin-bottom: 10px;
    text-align: center; max-width: 640px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #player-wrapper {
    width: 100%; max-width: 640px; aspect-ratio: 16/9;
    position: relative; border-radius: 6px; overflow: hidden;
    background: #000; transition: all .3s ease;
  }
  #player-wrapper.hidden-video {
    aspect-ratio: unset; height: 0; overflow: hidden; margin: 0;
  }
  #ytplayer { width: 100%; height: 100%; border: none; }
  /* Error overlay */
  #error-overlay {
    display: none; position: absolute; inset: 0;
    background: #1a1a1a; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; text-align: center; padding: 20px;
  }
  #error-overlay.visible { display: flex; }
  #error-overlay p { color: #aaa; font-size: .95rem; }
  #btn-watch-yt {
    padding: 10px 24px; border: none; border-radius: 20px;
    background: #f00; color: #fff; font-size: 1rem;
    cursor: pointer; font-family: inherit;
    text-decoration: none; display: inline-block;
  }
  #btn-watch-yt:hover { background: #c00; }
  #btn-skip-error {
    padding: 8px 20px; border: 1px solid #555; border-radius: 20px;
    background: transparent; color: #aaa; font-size: .85rem;
    cursor: pointer; font-family: inherit;
  }
  #btn-skip-error:hover { background: #333; }
  /* Controls */
  #controls {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    justify-content: center;
  }
  #controls button {
    padding: 8px 16px; border: none; border-radius: 20px;
    font-size: .85rem; cursor: pointer; font-family: inherit;
    transition: background .2s; color: #eee; background: #333;
  }
  #controls button:hover { filter: brightness(1.3); }
  #btn-order   { background: #c00; color: #fff; }
  #btn-toggle-video.active { background: #c00; color: #fff; }
  #mode-label  { font-size: .78rem; color: #aaa; align-self: center; }
  #ad-status   { font-size: .75rem; color: #fa0; align-self: center; display: none; }
  /* Song list */
  #song-list { max-width: 760px; margin: 24px auto; padding: 0 12px 40px; }
  h1 { text-align: center; font-size: 1.6rem; color: #f44; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #888; font-size: .85rem; margin-bottom: 20px; }
  .song-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
    border-bottom: 1px solid #222;
  }
  .song-card:hover  { background: #1e1e1e; }
  .song-card.active { background: #1a0000; border-left: 3px solid #f44; }
  .rank { width: 32px; text-align: right; font-size: .85rem; color: #666; flex-shrink: 0; }
  .song-card.active .rank { color: #f44; font-weight: bold; }
  .thumb {
    width: 72px; height: 54px; object-fit: cover;
    border-radius: 4px; flex-shrink: 0; background: #333;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-size: .95rem; color: #eee;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .song-card.active .song-title { color: #f77; }
  .song-meta { font-size: .75rem; color: #777; margin-top: 3px; }
  .section-header {
    font-size: 1.1rem; color: #fa0; padding: 16px 12px 8px;
    border-bottom: 1px solid #333; margin-bottom: 4px;
  }
  .delete-btn {
    margin-left: auto; flex-shrink: 0;
    background: none; border: none; color: #555;
    font-size: 1.1rem; cursor: pointer; padding: 4px 8px;
    border-radius: 4px; transition: color .2s;
  }
  .delete-btn:hover { color: #f44; }
  #add-panel {
    display: none; flex-direction: column; gap: 8px;
    background: #1a1a1a; border-radius: 8px;
    padding: 14px; margin-top: 10px;
    width: 100%; max-width: 640px;
  }
  #add-panel.visible { display: flex; }

  #add-panel input {
    padding: 8px 12px; border-radius: 8px; border: 1px solid #444;
    background: #222; color: #eee; font-size: .9rem; font-family: inherit;
  }
  #add-panel input::placeholder { color: #666; }
  #btn-add-confirm {
    padding: 8px 16px; border: none; border-radius: 20px;
    background: #c00; color: #fff; cursor: pointer;
    font-family: inherit; font-size: .9rem;
  }
</style>
</head>
<body>

<div id="player-section">
  <div id="player-title">點擊歌曲開始播放</div>
  <div id="player-wrapper">
    <div id="ytplayer"></div>
    <div id="error-overlay">
      <p>⚠️ 此影片已停用內嵌播放<br>請前往 YouTube 觀看</p>
      <a id="btn-watch-yt" href="#" target="_blank" rel="noopener">▶ 在 YouTube 上觀看</a>
      <button id="btn-skip-error" >⏭ 跳過，播放下一首</button>
    </div>
  </div>

  <div id="controls">
    <button id="btn-prev">⏮ 上一首</button>
    <button id="btn-order">▶ 順序播放</button>
    <button id="btn-shuffle">🔀 隨機播放</button>
    <button id="btn-next">⏭ 下一首</button>
    <button id="btn-toggle-video">🎵 純音樂模式</button>
    <button id="btn-add-song">➕ 新增歌曲</button>
    <button id="btn-reset">↺ 重置</button>
    <span  id="mode-label">順序播放</span>
    <span  id="ad-status">⏳ 廣告跳過中…</span>
  </div>

  <div id="add-panel">
    <input id="inp-url"     placeholder="YouTube URL 或 Video ID（必填）">
    <input id="inp-title"   placeholder="歌曲名稱（必填）">
    <input id="inp-meta"    placeholder="歌手 / 來源（可選）">
    <input id="inp-section" placeholder="新分類標題（可選，只填第一首需要）">
    <button id="btn-add-confirm" >➕ 加入歌單</button>
  </div>
</div>

<div id="song-list">
  <h1>🎵 廣東歌播放器</h1>
  <p class="subtitle">點擊播放 · 支援順序 / 隨機模式</p>
</div>

// ── Persistence ──────────────────────────────────────────────
// const STORAGE_KEY = 'cantonese_songs';
// const DEFAULT_SONGS = SONGS.slice(); // snapshot of hardcoded list


const App = {

    STORAGE_KEY: 'cantonese_songs',

    state: {
        songs: [],
        defaultSongs: [],
        playlist: [],
        currentPos: -1,
        mode: 'order',
        player: null
    },

    elements: {},


    // ====================================================
    // Init
    // ====================================================

    init(initialSongs) {

        this.cacheElements();

        this.state.songs = structuredClone(initialSongs);
        this.state.defaultSongs = structuredClone(initialSongs);

        this.loadSongs();

        this.buildPlaylist();
        this.bindEvents();
        this.renderSongs();
    },

    cacheElements() {

        this.elements = {
            songList: document.getElementById('song-list'),
            playerTitle: document.getElementById('player-title'),
            modeLabel: document.getElementById('mode-label'),
            wrapper: document.getElementById('player-wrapper'),
            addPanel: document.getElementById('add-panel'),
            overlay: document.getElementById('error-overlay'),

            btnOrder: document.getElementById('btn-order'),
            btnShuffle: document.getElementById('btn-shuffle'),
            btnToggleVideo: document.getElementById('btn-toggle-video'),

            inpURL: document.getElementById('inp-url'),
            inpTitle: document.getElementById('inp-title'),
            inpMeta: document.getElementById('inp-meta'),
            inpSection: document.getElementById('inp-section')
        };

    },


    // ====================================================
    // Events
    // ====================================================

    bindEvents() {

        document
            .getElementById('btn-prev')
            .addEventListener('click',()=>this.playPrev());

        document
            .getElementById('btn-next')
            .addEventListener('click',()=>this.playNext());

        document
            .getElementById('btn-order')
            .addEventListener('click',()=>this.setMode('order'));

        document
            .getElementById('btn-shuffle')
            .addEventListener('click',()=>this.setMode('shuffle'));

        document
            .getElementById('btn-toggle-video')
            .addEventListener('click',()=>this.toggleVideo());

        document
            .getElementById('btn-add-song')
            .addEventListener('click',()=>{
                this.elements.addPanel.classList.toggle('visible');
            });

        document
            .getElementById('btn-add-confirm')
            .addEventListener('click',()=>this.addSong());

        document
            .getElementById('btn-reset')
            .addEventListener('click', ()=>this.resetSongs());

        document
            .getElementById('btn-skip-error')
            .addEventListener('click', ()=>this.playNext());
    },


    // ====================================================
    // Storage
    // ====================================================

    saveSongs() {

        localStorage.setItem(
            this.STORAGE_KEY,
            JSON.stringify(this.state.songs)
        );

    },

    loadSongs() {

        try {

            const saved=localStorage.getItem(
                this.STORAGE_KEY
            );

            if(saved){

                this.state.songs=
                    JSON.parse(saved);

            }

        }
        catch(err){

            console.error(err);

        }

    },


    // ====================================================
    // Playlist
    // ====================================================

    buildPlaylist() {

        this.state.playlist =
            [...Array(
                this.state.songs.length
            ).keys()];

        if(this.state.mode==="shuffle"){

            this.shuffle(
                this.state.playlist
            );

        }

    },

    shuffle(arr){

        for(
            let i=arr.length-1;
            i>0;
            i--
        ){

            const j=
                Math.floor(
                    Math.random()*(i+1)
                );

            [arr[i],arr[j]]=
            [arr[j],arr[i]];

        }

    },


    setMode(mode){

        this.state.mode=mode;
        this.buildPlaylist();
        this.elements.modeLabel.textContent=
            mode==="shuffle"
            ? "🔀 隨機播放中"
            : "▶ 順序播放中";
        this.elements.btnOrder.style.background   = mode === 'order'   ? '#c00' : '#333';
        this.elements.btnShuffle.style.background = mode === 'shuffle' ? '#c00' : '#333';
    },


    // ====================================================
    // Render
    // ====================================================

    renderSongs(){

        const container=
            this.elements.songList;

        container
            .querySelectorAll(
                '.song-card,.section-header'
            )
            .forEach(el=>el.remove());

        this.state.songs.forEach(
            (song,index)=>{

            if(song.section){

                const section=
                    document.createElement(
                        'div'
                    );

                section.className=
                    'section-header';

                section.textContent=
                    song.section;

                container.appendChild(
                    section
                );

            }

            container.appendChild(
                this.createSongCard(
                    song,
                    index
                )
            );

        });

    },


    createSongCard(song,index){

        const card=
            document.createElement(
                'div'
            );

        card.className='song-card';

        card.dataset.idx=index;

        card.addEventListener(
            'click',
            ()=>this.playSong(index)
        );

        const rank=
            document.createElement(
                'span'
            );

        rank.className='rank';
        rank.textContent=index+1;


        const img=
            document.createElement(
                'img'
            );

        img.className='thumb';

        img.src=
        `https://img.youtube.com/vi/${song.vid}/mqdefault.jpg`;

        img.loading='lazy';


        const info=
            document.createElement(
                'div'
            );

        info.className='song-info';


        const title=
            document.createElement(
                'div'
            );

        title.className='song-title';

        title.textContent=
            song.title;


        const meta=
            document.createElement(
                'div'
            );

        meta.className='song-meta';

        meta.textContent=
            song.meta || "";


        const del=
            document.createElement(
                'button'
            );

        del.className=
            'delete-btn';

        del.textContent='🗑';

        del.addEventListener(
            'click',
            e=>{

                e.stopPropagation();

                this.deleteSong(
                    index
                );

            }
        );

        info.append(
            title,
            meta
        );

        card.append(
            rank,
            img,
            info,
            del
        );

        return card;

    },


    // ====================================================
    // Song actions
    // ====================================================

    playSong(index){
        this.elements.overlay.classList.remove('visible');   // ← hide error overlay
        const song = this.state.songs[index];
        this.state.currentPos =
        this.state.playlist.indexOf(index);
        this.elements.playerTitle.textContent = song.title;
        if (this.state.player){
            this.state.player.loadVideoById(song.vid);
        }
        document.querySelectorAll('.song-card')
            .forEach(x => x.classList.remove('active'));
        const card = document.querySelector(`[data-idx="${index}"]`);
        if (card){
            card.classList.add('active');
            card.scrollIntoView({ behavior:'smooth', block:'nearest' });  // ← scroll to card
        }
    },

    playNext(){

        const s=this.state;

        s.currentPos=
        (
            s.currentPos+1
        )%
        s.playlist.length;

        this.playSong(
            s.playlist[
                s.currentPos
            ]
        );

    },

    playPrev(){

        const s=this.state;

        s.currentPos=
        (
            s.currentPos-1+
            s.playlist.length
        )
        %
        s.playlist.length;

        this.playSong(
            s.playlist[
                s.currentPos
            ]
        );

    },

    deleteSong(index) {
        const curSongIdx = this.state.playlist[this.state.currentPos];
        this.state.songs.splice(index, 1);
        this.buildPlaylist();
        const adjusted = curSongIdx > index ? curSongIdx - 1 : curSongIdx;
        this.state.currentPos = this.state.playlist.indexOf(adjusted);
        this.saveSongs();
        this.renderSongs();
    },

    // ====================================================
    // Add Song
    // ====================================================

    parseVideoId(input){

        const regex=
        /(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([^?&/]{11})/;

        return (
            input.match(regex)?.[1]
            || input.trim()
        );

    },


    addSong(){
        const vid=
            this.parseVideoId(
                this.elements.inpURL.value
            );

        const title=
            this.elements.inpTitle
            .value.trim();

        if(
            !vid ||
            vid.length!==11
        ){
            alert(
                'Invalid video'
            );
            return;
        }

        if (!title) { 
           alert('請輸入歌曲名稱'); 
           return;
        }

        this.state.songs.push({
            vid,
            title,
            meta:
                this.elements
                .inpMeta.value,
            section:
                this.elements
                .inpSection.value

        });

        this.buildPlaylist();
        this.saveSongs();
        this.renderSongs();

        [this.elements.inpURL, 
         this.elements.inpTitle,
         this.elements.inpMeta, 
         this.elements.inpSection]
        .forEach(el => el.value = '');
        this.elements.addPanel.classList.remove('visible');
    },

    // Start ad check and stop it after a certain time. So users do not need click the skip ad button manually.
    startAdCheck() {
        this.stopAdCheck();
        this._adInterval = setInterval(() => {
            const p = this.state.player;
            if (!p || typeof p.getPlayerState !== 'function') return;
            if (p.getPlayerState() !== YT.PlayerState.PLAYING) return;
            try {
                const duration = p.getDuration();
                const current  = p.getCurrentTime();
                if (duration > 0 && duration <= 60 && current < duration - 1) {
                    document.getElementById('ad-status').style.display = 'inline';
                    p.seekTo(duration, true);
                } else {
                    document.getElementById('ad-status').style.display = 'none';
                }
            } catch(_) {}
        }, 800);
    },

    stopAdCheck() {
        if (this._adInterval) {
            clearInterval(this._adInterval);
            this._adInterval = null;
        }
        document.getElementById('ad-status').style.display = 'none';
    },

    // ====================================================
    // UI
    // ====================================================

    toggleVideo(){

        const hidden=
        this.elements.wrapper
        .classList.toggle(
            'hidden-video'
        );

        this.elements
        .btnToggleVideo
        .textContent=

        hidden
        ? '📺 顯示影片'
        : '🎵 純音樂模式';

    },

    resetSongs(){

        if(!confirm('重置為預設歌單？'))
            return;
    
        this.state.songs =
            structuredClone(
                this.state.defaultSongs
            );
    
        localStorage.removeItem(
            this.STORAGE_KEY
        );

        this.state.currentPos = -1;
        this.buildPlaylist();
        this.renderSongs();
    },


};


// ========================================================
// YouTube callback
// ========================================================

function onYouTubeIframeAPIReady(){

    App.state.player=
    new YT.Player(
        'ytplayer',
        {

            playerVars:{
                autoplay:1,
                rel:0
            },

            events:{

                onReady:()=>{
                    App.playSong(0)
                },

                onStateChange: e => {
                    if (e.data === YT.PlayerState.PLAYING) {
                        App.startAdCheck();
                    } else if (e.data === YT.PlayerState.ENDED) {
                        App.stopAdCheck();
                        setTimeout(() => App.playNext(), 1000);
                    } else {
                        App.stopAdCheck();
                    }
                },

                onError: e => {
                    if (e.data === 150 || e.data === 153) {
                        const vid = App.state.songs[App.state.playlist[App.state.currentPos]].vid;
                        document.getElementById('btn-watch-yt').href = 'https://www.youtube.com/watch?v=' + vid;
                        document.getElementById('error-overlay').classList.add('visible');
                    }
                }
            }
        }
    );

}


// ========================================================
// Start App
// ========================================================

App.init(SONGS);
</script>
