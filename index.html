<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>廣東歌播放器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #111; color: #eee;
  }
  #player-section {
    background: #000;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 12px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,.8);
  }
  #player-title {
    font-size: 1rem; color: #fff; margin-bottom: 10px;
    text-align: center; max-width: 640px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #player-wrapper {
    width: 100%; max-width: 640px; aspect-ratio: 16/9;
    position: relative; border-radius: 6px; overflow: hidden;
    background: #000; transition: all .3s ease;
  }
  #player-wrapper.hidden-video {
    aspect-ratio: unset; height: 0; overflow: hidden; margin: 0;
  }
  #ytplayer { width: 100%; height: 100%; border: none; }
  /* Error overlay */
  #error-overlay {
    display: none; position: absolute; inset: 0;
    background: #1a1a1a; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; text-align: center; padding: 20px;
  }
  #error-overlay.visible { display: flex; }
  #error-overlay p { color: #aaa; font-size: .95rem; }
  #btn-watch-yt {
    padding: 10px 24px; border: none; border-radius: 20px;
    background: #f00; color: #fff; font-size: 1rem;
    cursor: pointer; font-family: inherit;
    text-decoration: none; display: inline-block;
  }
  #btn-watch-yt:hover { background: #c00; }
  #btn-skip-error {
    padding: 8px 20px; border: 1px solid #555; border-radius: 20px;
    background: transparent; color: #aaa; font-size: .85rem;
    cursor: pointer; font-family: inherit;
  }
  #btn-skip-error:hover { background: #333; }
  /* Controls */
  #controls {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    justify-content: center;
  }
  #controls button {
    padding: 8px 16px; border: none; border-radius: 20px;
    font-size: .85rem; cursor: pointer; font-family: inherit;
    transition: background .2s; color: #eee; background: #333;
  }
  #controls button:hover { filter: brightness(1.3); }
  #btn-order   { background: #c00; color: #fff; }
  #btn-toggle-video.active { background: #c00; color: #fff; }
  #mode-label  { font-size: .78rem; color: #aaa; align-self: center; }
  #ad-status   { font-size: .75rem; color: #fa0; align-self: center; display: none; }
  /* Song list */
  #song-list { max-width: 760px; margin: 24px auto; padding: 0 12px 40px; }
  h1 { text-align: center; font-size: 1.6rem; color: #f44; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #888; font-size: .85rem; margin-bottom: 20px; }
  .song-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
    border-bottom: 1px solid #222;
  }
  .song-card:hover  { background: #1e1e1e; }
  .song-card.active { background: #1a0000; border-left: 3px solid #f44; }
  .rank { width: 32px; text-align: right; font-size: .85rem; color: #666; flex-shrink: 0; }
  .song-card.active .rank { color: #f44; font-weight: bold; }
  .thumb {
    width: 72px; height: 54px; object-fit: cover;
    border-radius: 4px; flex-shrink: 0; background: #333;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-size: .95rem; color: #eee;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .song-card.active .song-title { color: #f77; }
  .song-meta { font-size: .75rem; color: #777; margin-top: 3px; }
  .section-header {
    font-size: 1.1rem; color: #fa0; padding: 16px 12px 8px;
    border-bottom: 1px solid #333; margin-bottom: 4px;
  }
</style>

<body>

<div id="player-section">
  <div id="player-title">點擊歌曲開始播放</div>
  <div id="player-wrapper">
    <div id="ytplayer"></div>
    <div id="error-overlay">
      <p>⚠️ 此影片已停用內嵌播放<br>請前往 YouTube 觀看</p>
      <a id="btn-watch-yt" href="#" target="_blank" rel="noopener">▶ 在 YouTube 上觀看</a>
      <button id="btn-skip-error" onclick="playNext()">⏭ 跳過，播放下一首</button>
    </div>
  </div>
  <div id="controls">
    <button id="btn-prev"         onclick="playPrev()">⏮ 上一首</button>
    <button id="btn-order"        onclick="setMode('order')">▶ 順序播放</button>
    <button id="btn-shuffle"      onclick="setMode('shuffle')">🔀 隨機播放</button>
    <button id="btn-next"         onclick="playNext()">⏭ 下一首</button>
    <button id="btn-toggle-video" onclick="toggleVideo()">🎵 純音樂模式</button>
    <span  id="mode-label">順序播放</span>

// ═══════════════════════════════════════════════════════════════
//  Render song list
// ═══════════════════════════════════════════════════════════════
function renderSongList() {
  const container = document.getElementById('song-list');
  // Clear previous cards (keep h1 and subtitle)
  const existing = container.querySelectorAll('.song-card, .section-header');
  existing.forEach(e => e.remove());

  const sections = [
    { label: '🎵 廣東歌', start: 0,   end: 33  },
    { label: '新馬師曾', start: 34, end: 37 },
    { label: '紅線女', start: 38, end: 41 },
  ];

  let sIdx = 0;
  SONGS.forEach((song, idx) => {
    // Insert section header when needed
    if (sIdx < sections.length && idx === sections[sIdx].start) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = sections[sIdx].label;
      container.appendChild(hdr);
      sIdx++;
    }
    const card = document.createElement('div');
    card.className = 'song-card';
    card.dataset.idx = idx;
    card.onclick = () => playSong(idx);
    card.innerHTML = `
      <span class="rank">${idx + 1}</span>
      <img class="thumb"
           src="https://img.youtube.com/vi/${song.vid}/mqdefault.jpg"
           alt="封面" loading="lazy">
      <div class="song-info">
        <div class="song-title">${song.title}</div>
        <div class="song-meta">${song.meta}</div>
      </div>`;
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════════
//  Playlist state
// ═══════════════════════════════════════════════════════════════
let playlist   = [...Array(SONGS.length).keys()];
let currentPos = -1;
let mode       = 'order';
let player     = null;
let adCheckInterval = null;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-label').textContent =
    m === 'shuffle' ? '🔀 隨機播放中' : '▶ 順序播放中';
  document.getElementById('btn-order').style.background   = m === 'order'   ? '#c00' : '#333';
  document.getElementById('btn-shuffle').style.background = m === 'shuffle' ? '#c00' : '#333';
  if (m === 'shuffle') {
    shuffle(playlist);
    if (currentPos >= 0) {
      const cur = playlist[currentPos];
      playlist.splice(playlist.indexOf(cur), 1);
      playlist.unshift(cur);
      currentPos = 0;
    }
  } else {
    const curIdx = currentPos >= 0 ? playlist[currentPos] : -1;
    playlist = [...Array(SONGS.length).keys()];
    currentPos = curIdx >= 0 ? curIdx : -1;
  }
}

function playSong(songIdx) {
  hideOverlay();
  currentPos = playlist.indexOf(songIdx);
  if (currentPos === -1) {
    playlist = [...Array(SONGS.length).keys()];
    if (mode === 'shuffle') shuffle(playlist);
    currentPos = playlist.indexOf(songIdx);
  }
  loadVideo(songIdx);
}

function playNext() {
  hideOverlay();
  if (currentPos === -1) { playSong(0); return; }
  currentPos = (currentPos + 1) % playlist.length;
  loadVideo(playlist[currentPos]);
}

function playPrev() {
  hideOverlay();
  if (currentPos === -1) { playSong(0); return; }
  currentPos = (currentPos - 1 + playlist.length) % playlist.length;
  loadVideo(playlist[currentPos]);
}

function loadVideo(songIdx) {
  const song = SONGS[songIdx];
  if (player && player.loadVideoById) {
    player.loadVideoById(song.vid);
  }
  document.getElementById('player-title').textContent = song.title;
  document.querySelectorAll('.song-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.song-card[data-idx="${songIdx}"]`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ═══════════════════════════════════════════════════════════════
//  Ad-skip: poll every 800ms; if duration < 60s and playing,
//  assume it's an ad and seek to end.
// ═══════════════════════════════════════════════════════════════
function startAdCheck() {
  stopAdCheck();
  adCheckInterval = setInterval(() => {
    if (!player || typeof player.getPlayerState !== 'function') return;
    const state = player.getPlayerState();
    if (state !== YT.PlayerState.PLAYING) return;
    try {
      const duration = player.getDuration();
      const current  = player.getCurrentTime();
      // Ads are typically ≤ 60 seconds; normal songs are longer
      if (duration > 0 && duration <= 60 && current < duration - 1) {
        document.getElementById('ad-status').style.display = 'inline';
        player.seekTo(duration, true);   // jump to end of ad
      } else {
        document.getElementById('ad-status').style.display = 'none';
      }
    } catch(_) {}
  }, 800);
}

function stopAdCheck() {
  if (adCheckInterval) { clearInterval(adCheckInterval); adCheckInterval = null; }
  document.getElementById('ad-status').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════
//  YouTube IFrame API callbacks
// ═══════════════════════════════════════════════════════════════
function onYouTubeIframeAPIReady() {
  player = new YT.Player('ytplayer', {
    width: '100%', height: '100%',
    playerVars: { autoplay: 1, rel: 0 },
    events: {
      onReady:       () => playSong(0),
      onStateChange: onPlayerStateChange,
      onError:       onPlayerError
    }
  });
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    startAdCheck();
  } else if (event.data === YT.PlayerState.ENDED) {
    stopAdCheck();
    setTimeout(playNext, 1000);
  } else {
    stopAdCheck();
  }
}

function onPlayerError(event) {
  stopAdCheck();
  if (event.data === 153 || event.data === 150) {
    const vid = SONGS[playlist[currentPos]].vid;
    document.getElementById('btn-watch-yt').href =
      'https://www.youtube.com/watch?v=' + vid;
    document.getElementById('error-overlay').classList.add('visible');
  }
}

// ═══════════════════════════════════════════════════════════════
//  UI helpers
// ═══════════════════════════════════════════════════════════════
function hideOverlay() {
  document.getElementById('error-overlay').classList.remove('visible');
}

function toggleVideo() {
  const wrapper = document.getElementById('player-wrapper');
  const btn = document.getElementById('btn-toggle-video');
  const isHidden = wrapper.classList.toggle('hidden-video');
  btn.textContent = isHidden ? '📺 顯示影片' : '🎵 純音樂模式';
  btn.classList.toggle('active', isHidden);
}

// ═══════════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════════
renderSongList();
</script>
